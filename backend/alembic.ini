# alembic.ini
# Alembic reads this file to know where to find migration scripts and how to
# connect to the database. DATABASE_URL is injected at runtime from .env via
# alembic/env.py (see that file) so this ini does NOT hardcode credentials.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# The actual URL is set programmatically in env.py – leave this blank.
sqlalchemy.url =

[post_write_hooks]
# Optional: run black formatter on generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
